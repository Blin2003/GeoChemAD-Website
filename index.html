<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Mineral Map</title>

<link rel="stylesheet" href="node_modules/leaflet/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<h2>Mineral Data Map</h2>

<div id="map"></div>

<script src="node_modules/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([31.57,120.29],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

L.marker([31.57,120.29])
.addTo(map)
.bindPopup("Example mineral location");

</script>

</body>
</html>
